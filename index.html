<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Snow Entry Page ❄️</title>  
  
<style>  
* {  
  margin: 0;  
  padding: 0;  
  box-sizing: border-box;  
}  
  
body {  
  overflow: hidden;  
  font-family: 'Segoe UI', sans-serif;  
  background: linear-gradient(#0f2027, #203a43, #2c5364);  
  height: 100vh;  
}  
  
/* Snow container */  
.snow {  
  position: fixed;  
  width: 100%;  
  height: 100%;  
  pointer-events: none;  
}  
  
/* Snowflakes */  
.snow span {  
  position: absolute;  
  top: -10px;  
  color: white;  
  font-size: 14px;  
  animation: fall linear infinite;  
}  
  
@keyframes fall {  
  0% {  
    transform: translateY(-10vh);  
  }  
  100% {  
    transform: translateY(110vh);  
  }  
}  
  
/* Entry screen */  
#entry {  
  position: absolute;  
  width: 100%;  
  height: 100%;  
  display: flex;  
  justify-content: center;  
  align-items: center;  
}  
  
/* Button */  
button {  
  padding: 15px 35px;  
  font-size: 20px;  
  border: none;  
  border-radius: 30px;  
  background: white;  
  color: black;  
  cursor: pointer;  
  transition: 0.3s;  
}  
  
button:hover {  
  transform: scale(1.1);  
  background: #ddd;  
}  
  
/* Main content (kept but not used now) */  
#main {  
  display: none;  
  color: white;  
  text-align: center;  
  margin-top: 40vh;  
  font-size: 30px;  
}  
</style>  
  
</head>  
<body>  
  
<!-- Snow -->  
<div class="snow" id="snow"></div>  
  
<!-- Entry Screen -->  
<div id="entry">  
  <button onclick="enterPage()">Click to Enter ❄️</button>  
</div>  
  
<!-- Main Content (fallback if needed) -->  
<div id="main">  
  Welcome 🎉    
</div>  
  
<script>  
// Generate snowflakes  
const snowContainer = document.getElementById("snow");  
  
for (let i = 0; i < 80; i++) {  
  let snow = document.createElement("span");  
  snow.innerHTML = "❄";  
    
  snow.style.left = Math.random() * 100 + "vw";  
    
  // SLOWER falling (important change)
  snow.style.animationDuration = (6 + Math.random() * 8) + "s";  
  
  snow.style.opacity = Math.random();  
  
  snowContainer.appendChild(snow);  
}  
  
// Enter button function (redirect to main.html)
function enterPage() {  
  window.location.href = "main.html";  
}  
</script>  
  
</body>  
</html>
