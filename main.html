<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Profile ✦</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #ff8c00, #0a0a0a 70%);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Snow */
.snowflake {
  position: absolute;
  top: -10px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* Main Container */
.container {
  text-align: center;
  position: relative;
}

/* Profile Image */
.profile-img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
  margin-bottom: 15px;
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
}

/* Name */
.name {
  font-size: 42px;
  font-family: 'Playfair Display', serif;
  margin-bottom: 5px;
}

.bio {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 10px;
}

.location {
  font-size: 16px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* Glass Card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 15px;
  width: 280px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.card img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.card-text {
  text-align: left;
}

.card-text span {
  display: block;
  font-size: 13px;
  opacity: 0.7;
}

/* Social Icons */
.icons {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: gold;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: black;
  box-shadow: 0 0 15px gold;
  transition: 0.3s;
  cursor: pointer;
}

.icon:hover {
  transform: scale(1.2);
}

/* Wings */
.wing {
  position: absolute;
  font-size: 30px;
  opacity: 0.7;
}

.wing.left {
  left: 10%;
  top: 60%;
}

.wing.bottom {
  bottom: 5%;
}

/* Views */
.views {
  position: absolute;
  bottom: 10px;
  left: 15px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

  <!-- Profile -->
  <img src="https://i.ibb.co/7QpKsCX/girl.jpg" class="profile-img">

  <div class="name">♡ Shaa</div>
  <div class="bio">Dark DomiNance ..</div>
  <div class="location">📍 Madurai</div>

  <!-- Card -->
  <div class="card">
    <img src="https://i.ibb.co/6r6p9QF/sketch.jpg">
    <div class="card-text">
      <b>acpxp 🦋 3luv</b>
      <span>last seen 1 hour ago</span>
    </div>
  </div>

  <!-- Icons -->
  <div class="icons">
    <div class="icon">📷</div>
    <div class="icon">✈️</div>
    <div class="icon">💬</div>
    <div class="icon">🎵</div>
    <div class="icon">▶️</div>
  </div>

</div>

<!-- Wings -->
<div class="wing left">🪽</div>
<div class="wing bottom">🪽</div>

<!-- Views -->
<div class="views">👁️ 454</div>

<script>
// Snow generator
function createSnow() {
  const snow = document.createElement("div");
  snow.classList.add("snowflake");
  snow.innerHTML = "❄";
  snow.style.left = Math.random() * window.innerWidth + "px";
  snow.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(snow);

  setTimeout(() => snow.remove(), 8000);
}

setInterval(createSnow, 150);
</script>

</body>
</html>
