<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Profile ✦</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #ff8c00, #0a0a0a 70%);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Snow */
.snowflake {
  position: absolute;
  top: -10px;
  color: white;
  font-size: 14px;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* Main Container */
.container {
  text-align: center;
  position: relative;
}

/* ICONS */
.icon-img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.icon-wrap {
  position: relative;
  display: inline-block;
}

.icon-img:hover {
  transform: scale(1.2);
  box-shadow: 0 0 25px #ff4d6d;
}

/* Profile Image */
.profile-img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
  margin-bottom: 15px;
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
}

/* NAME WITH PARTICLES */
.name {
  font-size: 42px;
  font-family: 'Playfair Display', serif;
  margin-bottom: 5px;
  position: relative;

  background: linear-gradient(90deg, #fff, #ffcc70, #fff);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 5s linear infinite, fadeUp 1s ease forwards;
}

/* Glow pulse */
.name::after {
  content: "Babayaga";
  position: absolute;
  left: 0;
  top: 0;
  color: transparent;
  text-shadow: 0 0 10px rgba(255, 200, 100, 0.4),
               0 0 20px rgba(255, 150, 50, 0.3);
  animation: glowPulse 3s infinite alternate;
}

/* Dark particles inside text */
.name::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.6) 2px, transparent 3px);
  background-size: 20px 20px;
  opacity: 0.4;
  animation: moveParticles 10s linear infinite;
  mix-blend-mode: overlay;
}

/* Animations */
@keyframes shine {
  to { background-position: 200% center; }
}

@keyframes glowPulse {
  from { opacity: 0.4; }
  to { opacity: 0.8; }
}

@keyframes moveParticles {
  from { background-position: 0 0; }
  to { background-position: 200px 200px; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TEXT ANIMATIONS */
.bio {
  font-size: 18px;
  opacity: 0;
  margin-bottom: 10px;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.4s;
}

.location {
  font-size: 16px;
  opacity: 0;
  margin-bottom: 20px;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.7s;
}

/* Glass Card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 15px;
  width: 280px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);

  animation: fadeUp 1s ease forwards;
  animation-delay: 1s;
}

.card img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.card-text span {
  display: block;
  font-size: 13px;
  opacity: 0.7;
}

/* icons */
.icons {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 18px;
}

.social-btn {
  width: 55px;
  height: 55px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px gold);
  transition: 0.3s ease;
}

.social-btn:hover {
  transform: scale(1.2);
  filter: drop-shadow(0 0 20px #ffcc70);
}

/* Wings */
.wing {
  position: absolute;
  font-size: 22px;
  opacity: 0.9;
  top: 50%;
  transform: translateY(-50%);
}

.wing-left { left: -20px; }
.wing-right { right: -20px; }

/* Confirm Box */
.confirm-box {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
}

.confirm-card {
  width: 300px;
  padding: 20px;
  border-radius: 20px;
  background: #111;
  color: white;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.url-box {
  background: #2a2a2a;
  padding: 8px;
  border-radius: 10px;
  margin: 10px 0 15px;
}

.confirm-actions {
  display: flex;
}

.confirm-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin: 0 5px;
}

.visit {
  background: linear-gradient(45deg, #7b2ff7, #f107a3);
}

.cancel {
  background: #333;
}

</style>
</head>

<body>

<div class="container">

<img src="pfg.jpg" class="profile-img">

<div class="name">Babayaga</div>
<div class="bio">Dark Dominance ..</div>
<div class="location">📍 coimbatore</div>

<div class="card">
  <img src="IMG_20260417_151049_449.webp">
  <div class="card-text">
    <b>acpxp 🦋 3luv</b>
    <span>last seen 1 hour ago</span>
  </div>
</div>

<div class="icons">

<div class="icon-wrap">
<span class="wing wing-left">🪽</span>
<a href="#" onclick="openConfirm('https://www.instagram.com/babayaga__4luv')">
<img src="instabutton.webp" class="social-btn">
</a>
</div>

<a href="#" onclick="openConfirm('https://t.me/yourlink')">
<img src="telebutton.webp" class="social-btn">
</a>

<a href="#" onclick="openConfirm('https://discord.gg/yourlink')">
<img src="disbutton.webp" class="social-btn">
</a>

<a href="#" onclick="openConfirm('https://spotify.com/...')">
<img src="spotbutton.webp" class="social-btn">
</a>

<div class="icon-wrap">
<a href="#" onclick="openConfirm('https://youtube.com/...')">
<img src="tubebutton.webp" class="social-btn">
</a>
<span class="wing wing-right">🪽</span>
</div>

</div>

</div>

<script>
// Snow
function createSnow() {
  const snow = document.createElement("div");
  snow.classList.add("snowflake");
  snow.innerHTML = "❄";
  snow.style.left = Math.random() * window.innerWidth + "px";
  snow.style.animationDuration = (3 + Math.random() * 10) + "s";
  document.body.appendChild(snow);
  setTimeout(() => snow.remove(), 8000);
}
setInterval(createSnow, 150);

// Confirm
let targetLink = "";

function openConfirm(url) {
  targetLink = url;
  document.getElementById("confirmBox").style.display = "flex";
  document.getElementById("confirmUrl").innerText = url;
}

function closeConfirm() {
  document.getElementById("confirmBox").style.display = "none";
}

window.onload = function () {
  document.getElementById("visitBtn").onclick = function () {
    window.open(targetLink, "_blank");
    closeConfirm();
  };
};
</script>

<div id="confirmBox" class="confirm-box">
  <div class="confirm-card">
    <h3>Are you sure?</h3>
    <p>You are going to visit</p>
    <div class="url-box" id="confirmUrl"></div>
    <div class="confirm-actions">
      <button id="visitBtn" class="visit">Visit</button>
      <button onclick="closeConfirm()" class="cancel">Cancel</button>
    </div>
  </div>
</div>

</body>
</html>
